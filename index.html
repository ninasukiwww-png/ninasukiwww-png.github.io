    <style>
        :root {
            --color-bg-deep: #0b2b3b;
            --color-accent: #8fd8ef;
            --glass-bg: rgba(255,255,255,0.12);
            --glass-border: rgba(255,255,255,0.20);
            --glass-hover-bg: rgba(255,255,255,0.22);
            --glass-header-bg: rgba(11,43,59,0.55);
            --shadow-card: 0 30px 60px -16px rgba(0,0,0,0.45);
            --shadow-item: 0 4px 16px -6px rgba(0,0,0,0.15);
            --shadow-toast: 0 8px 30px rgba(0,0,0,0.35);
            --radius-card: 3rem;
            --radius-item: 1.5rem;
            --font-mono: 'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;
            --font-sans: 'Segoe UI',Roboto,'Helvetica Neue',system-ui,-apple-system,sans-serif;
            --font-title: 'ZCOOL KuaiLe', cursive, var(--font-sans);
            --body-pad: clamp(1.2rem, 5.88vw, 2.5rem);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--body-pad);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            background:
                url('https://snowblock.top/138936740_p0.webp') center / cover no-repeat fixed,
                linear-gradient(160deg, #cce7f5, #b3daf2, #9fccee);
            overflow: hidden;
        }

        /* 全屏浅色遮罩（调淡，不干扰卡片黑色层） */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.08);
            pointer-events: none;
            z-index: 0;
        }

        body > * { position: relative; z-index: 1; }

        #snowCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 1.5s ease 0.5s;
        }

        #loader.hidden ~ #snowCanvas {
            opacity: 1;
        }

        /* ===== 加载层 ===== */
        #loader {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #d4eaf7, #b8d8ee, #d4eaf7);
            background-size: 200% 200%;
            animation: loaderBgShift 6s ease infinite;
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease, transform 0.5s ease;
        }

        @keyframes loaderBgShift {
            0%   { background-position: 0% 0%; }
            50%  { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: scale(1.05);
        }

        /* ===== 方案三：SVG 雪晶生长 ===== */
        .loader-crystal {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        .crystal-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .crystal-svg {
            width: 90px;
            height: 90px;
            animation: crystalFloat 4s ease-in-out infinite;
            filter: drop-shadow(0 0 12px rgba(143,216,239,0.3));
        }

        @keyframes crystalFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25%      { transform: translateY(-8px) rotate(3deg); }
            75%      { transform: translateY(4px) rotate(-2deg); }
        }

        .crystal-svg .main-line {
            stroke-dasharray: 360;
            stroke-dashoffset: 360;
            animation: drawCrystal 3.5s ease-in-out infinite alternate;
        }

        .crystal-svg .inner-line {
            stroke-dasharray: 240;
            stroke-dashoffset: 240;
            animation: drawCrystal 3.5s ease-in-out 0.6s infinite alternate;
        }

        .crystal-svg .core-line {
            stroke-dasharray: 80;
            stroke-dashoffset: 80;
            animation: drawCrystal 2.5s ease-in-out 1.2s infinite alternate;
        }

        @keyframes drawCrystal {
            0%   { stroke-dashoffset: 360; }
            60%  { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: 0; }
        }

        .crystal-glow {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(143,216,239,0.15), transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50%      { opacity: 0.8; transform: scale(1.2); }
        }

        .loader-text-frost {
            font-family: var(--font-title);
            font-size: 1.3rem;
            background: linear-gradient(135deg, #8fd8ef, #c0f0ff, #ffe6b0, #8fd8ef);
            background-size: 300% 300%;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: frostShift 4s ease infinite;
        }

        @keyframes frostShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .loader-dots {
            display: flex;
            gap: 6px;
            margin-top: 0.2rem;
        }

        .loader-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #8fd8ef;
            animation: dotBounce 1.2s ease-in-out infinite;
        }

        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50%      { transform: translateY(-8px); opacity: 1; }
        }

        /* ---------- 卡片主体 ---------- */
        .card {
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px) saturate(1.2);
            -webkit-backdrop-filter: blur(12px) saturate(1.2);
            border-radius: var(--radius-card);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.12);
            overflow: hidden;
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            position: relative;

        /* ✅ 毛玻璃下方的黑色遮罩 —— 提高文字可读性 */
        .card::before {
            content: '';

            inset: 0;
            border-radius: var(--radius-card);
            background: rgba(0, 0, 0, 0.25);
            z-index: -1;
            pointer-events: none;

        .card.visible {
            opacity: 1;
            transform: translateY(0);

            color: transparent;

        .header .domain {

            font-family: var(--font-mono);
            font-size: clamp(0.7rem,1.5vw,0.9rem);
            letter-spacing: 0.02em;
        }

        .content { padding: 1.5rem 1.8rem; }

        .greeting {
            font-size: clamp(0.9rem,2.5vw,1.3rem);
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.45);

            opacity: 0;

        }

        .service-list {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin: 1rem 0;
        }

        .service-item {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.2rem 0.4rem;
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(8px) saturate(1.2);
            -webkit-backdrop-filter: blur(8px) saturate(1.2);
            border-radius: var(--radius-item);
            padding: 0.75rem 1.1rem;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: var(--shadow-item);
            text-decoration: none;
            color: inherit;
            outline-offset: 2px;
            transition: background 0.25s, transform 0.25s, box-shadow 0.25s;
            cursor: default;
            opacity: 0;
            transform: translateX(-12px);
        }

        .service-item:nth-child(1) { animation: fadeSlide 0.4s ease 0.4s forwards; }
        .service-item:nth-child(2) { animation: fadeSlide 0.4s ease 0.5s forwards; }
        .service-item:nth-child(3) { animation: fadeSlide 0.4s ease 0.6s forwards; }
        .service-item:nth-child(4) { animation: fadeSlide 0.4s ease 0.7s forwards; }

        @keyframes fadeSlide {
            0%   { opacity: 0; transform: translateX(-12px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .service-item[href] { cursor: pointer; }
        .service-item[data-copy] { cursor: copy; }

        @media (hover: hover) {
            .service-item:hover {
                background: var(--glass-hover-bg);
                backdrop-filter: blur(12px) saturate(1.4);
                transform: translateX(4px) scale(1.01);
                box-shadow: 0 8px 28px -10px rgba(0,0,0,0.30);
            }
        }

        .service-item:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 3px;
        }

        .service-item.copied {
            background: rgba(100,220,180,0.25) !important;
            border-color: rgba(100,220,180,0.45) !important;
            transform: scale(1.02);
            transition: all 0.12s;
        }

        .service-name {
            font-size: clamp(0.85rem,2.2vw,1.05rem);
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.35);
            flex-shrink: 0;
            min-width: 85px;
        }

        .service-url {
            color: #ddf4ff;
            font-family: var(--font-mono);
            word-break: break-all;
            text-shadow: 0 1px 4px rgba(0,0,0,0.25);
            font-size: clamp(0.65rem,1.8vw,0.9rem);
        }

        .service-desc {
            font-size: 0.6rem;
            color: rgba(200,235,250,0.80);
            white-space: nowrap;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            padding: 0.7rem 1.6rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: var(--shadow-toast);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .status-box {
            margin: 1rem 0 0.3rem;
            padding: 1rem 1.2rem;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(8px) saturate(1.2);
            -webkit-backdrop-filter: blur(8px) saturate(1.2);
            border-radius: var(--radius-item);
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 4px 20px -8px rgba(0,0,0,0.25);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            opacity: 0;
            animation: fadeSlide 0.5s ease 0.8s forwards;
        }

        .clock {
            font-family: var(--font-mono);
            font-size: clamp(1.8rem,5vw,2.6rem);
            font-weight: 300;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.40);
            letter-spacing: 0.06em;
            line-height: 1.2;

        .clock .seconds {
            font-size: 0.55em;
            color: rgba(255,255,255,0.55);
            vertical-align: super;
        }

        .status-motto {
            font-size: clamp(0.75rem,2vw,0.9rem);
            color: rgba(200,235,250,0.80);
            text-shadow: 0 1px 4px rgba(0,0,0,0.25);
            min-height: 1.5em;
        }

        .status-motto::after {
            content: '▍';
            display: inline;
            animation: blink 0.8s step-end infinite;
            color: rgba(200,235,250,0.60);
            margin-left: 1px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .uptime {
            font-size: clamp(0.6rem,1.5vw,0.75rem);
            color: rgba(200,235,250,0.50);
            text-shadow: 0 1px 4px rgba(0,0,0,0.20);
            font-family: var(--font-mono);
        }

        .footer-note {
            font-size: 0.7rem;
            color: rgba(200,235,250,0.70);
            text-shadow: 0 1px 4px rgba(0,0,0,0.30);
            text-align: center;
            margin-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 0.8rem;
            opacity: 0;
            animation: fadeSlide 0.5s ease 1s forwards;
        }

                <path class="inner-line" stroke="#c0f0ff" stroke-width="1.4" stroke-linecap="round"
                      fill="none"
                      d="M50 15 L50 85
                         M50 15 L65 30 L50 50

                      d="M50 38 L50 62
                         M50 38 L57 44 L50 50

                         M50 62 L57 56 L50 50

<canvas id="snowCanvas" aria-hidden="true"></canvas>

<div class="toast" id="" aria-live="polite"></div>

<main class="card loading" id="mainCard">
    <header class="header">
        <h1>❄️ SnowBlock</h1>
        <p class="domain">snowblock.top · 导航</p>
    </header>

    <div class="content">
        <h2 class="greeting" id="greeting"></h2>

        <nav class="service-list" aria-label="服务导航">
            <a href="https://blog.snowblock.top" class="service-item" target="_blank" rel="noopener">
                <span class="service-name">博客</span>
                <span class="service-url">blog.snowblock.top</span>
            </a>

            <span class="service-item" data-copy="play.snowblock.top" tabindex="0" role="button"
                  aria-label="复制 MC 服务器地址 play.snowblock.top">
                <span class="service-name">MC 服务器</span>
                <span class="service-url">play.snowblock.top</span>
                <span class="service-desc">点击复制</span>
            </span>

            <a href="https://status.snowblock.top" class="service-item" target="_blank" rel="noopener">
                <span class="service-name">MC 状态监控</span>
                <span class="service-url">status.snowblock.top</span>
            </a>

            <a href="https://monitor.snowblock.top" class="service-item" target="_blank" rel="noopener">
                <span class="service-name">服务器性能监控</span>
                <span class="service-url">monitor.snowblock.top</span>
            </a>
        </nav>

        <div class="status-box">
            <div class="clock" id="clock">
                <span id="clockTime">00:00</span>
                <span class="seconds" id="clockSeconds">00</span>
            </div>
            <div class="status-motto" id="statusMotto"></div>
            <div class="uptime" id="uptime"></div>
        </div>

        <footer class="footer-note" role="contentinfo">
            子域名现在大都只是空壳，所以进不去是正常的（
        </footer>
    </div>
</main>

<script>
(function() {
    'use strict';

    var loader = document.getElementById('loader');
    var card = document.getElementById('mainCard');
    var bgImage = 'https://snowblock.top/138936740_p0.webp';
    var loaded = false;
    var minTimePassed = false;

    var img = new Image();
    img.src = bgImage;
    img.onload = function() { loaded = true; checkShowCard(); };
    img.onerror = function() { loaded = true; checkShowCard(); };

    setTimeout(function() {
        minTimePassed = true;
        checkShowCard();
    }, 1500);

    var timeout = setTimeout(function() {
        if (!card.classList.contains('visible')) {
            loaded = true;
            minTimePassed = true;
            checkShowCard();
        }
    }, 5000);

    function checkShowCard() {
        if (loaded && minTimePassed && !card.classList.contains('visible')) {
            clearTimeout(timeout);
            loader.classList.add('hidden');
            card.classList.remove('loading');
            setTimeout(function() { card.classList.add('visible'); }, 20);
            loader.addEventListener('transitionend', function() {
                if (loader.classList.contains('hidden')) {
                    loader.style.display = 'none';
                }
            }, { once: true });
        }
    }

    var canvas = document.getElementById('snowCanvas');
    var ctx = canvas.getContext('2d');
    var particles = [];
    var w, h;

    function resizeCanvas() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    var MAX_PARTICLES = window.innerWidth < 768 ? 30 : 60;

    function createParticle() {
        return {
            x: Math.random() * w,
            y: -10,
            r: Math.random() * 2.5 + 1.2,
            speed: Math.random() * 0.6 + 0.15,
            wind: Math.random() * 0.3 - 0.15,
            alpha: Math.random() * 0.35 + 0.15
        };
    }

    function initSnow() {
        for (var i = 0; i < MAX_PARTICLES; i++) {
            var p = createParticle();
            p.y = Math.random() * h;
            particles.push(p);
        }
    }
    initSnow();

    function drawSnow() {
        ctx.clearRect(0, 0, w, h);
        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, ' + p.alpha + ')';
            ctx.fill();
            p.y += p.speed;
            p.x += p.wind;
            if (p.y > h + 10) particles[i] = createParticle();
            if (p.x > w + 10) p.x = -10;
            if (p.x < -10) p.x = w + 10;
        }
        while (particles.length < MAX_PARTICLES) {
            particles.push(createParticle());
        }
        requestAnimationFrame(drawSnow);
    }
    drawSnow();

    var toast = document.getElementById('toast');
    var toastTimer = null;

    function showToast(msg, dur) {
        if (dur === undefined) dur = 2000;
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function() {
            toast.classList.remove('show');
        }, dur);
    }

    function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() {
                showToast('✅ 已复制：' + text);
            }).catch(function() {
                fallbackCopy(text);
            });
        } else {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        try {
            if (document.execCommand('copy')) showToast('✅ 已复制：' + text);
            else showToast('❌ 复制失败');
        } catch(e) {
            showToast('❌ 复制失败');
        }
        document.body.removeChild(ta);
    }

    document.querySelectorAll('[data-copy]').forEach(function(el) {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            var t = el.getAttribute('data-copy');
            if (t) {
                copyText(t);
                el.classList.add('copied');
                setTimeout(function() { el.classList.remove('copied'); }, 300);
            }
        });
        el.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                el.click();
            }
        });
    });

    var greetingEl = document.getElementById('greeting');
    if (greetingEl) {
        var hour = new Date().getHours();
        var greet;
        if (hour < 6) greet = '🌙 夜深了';
        else if (hour < 9) greet = '🌅 早上好';
        else if (hour < 12) greet = '☀️ 上午好';
        else if (hour < 14) greet = '🌤️ 中午好';
        else if (hour < 18) greet = '🌇 下午好';
        else if (hour < 21) greet = '🌆 傍晚好';
        else greet = '🌙 晚上好';
        greetingEl.textContent = greet + '，要做些什么？';
    }

    var clockTime = document.getElementById('clockTime');
    var clockSeconds = document.getElementById('clockSeconds');

    function updateClock() {
        var now = new Date();
        clockTime.textContent = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        clockSeconds.textContent = String(now.getSeconds()).padStart(2, '0');
    }
    updateClock();
    setInterval(updateClock, 1000);

    var mottoEl = document.getElementById('statusMotto');
    var mottoText = '';
    var mottoFrom = '';
    var charIndex = 0;
    var isDeleting = false;
    var typeSpeed = 60;
    var deleteSpeed = 25;
    var pauseTime = 6000;
    var isBusy = false;

    var fallbacks = [
        '❄️ 今天也在雪地里码代码',
        '🎮 服务器开着，来玩吗',
        '☕ 咖啡因浓度：高',
        '🌙 夜猫子出没中',
        '🏔️ 雪山服务器运行中',
        '✨ 保持好奇，保持愚蠢',
        '⚡ 系统状态：摸鱼',
        '🍵 先喝口水再干活',
        '🌨️ 雪下了一整天',
        '🔄 正在重启智商...',
        '🎯 目标是：不咕'
    ];

    function fetchHitokoto() {
        if (isBusy) return;
        isBusy = true;

        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'https://v1.hitokoto.cn', true);
        xhr.timeout = 4000;

        xhr.onload = function() {
            isBusy = false;
            if (xhr.status === 200) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    if (data && data.hitokoto) {
                        mottoText = data.hitokoto;
                        mottoFrom = data.from ? ' ——' + data.from : '';
                        startTyping();
                        return;
                    }
                } catch(e) {}
            }
            useFallback();
        };

        xhr.onerror = function() { isBusy = false; useFallback(); };
        xhr.ontimeout = function() { isBusy = false; useFallback(); };
        xhr.send();
    }

    function useFallback() {
        mottoText = fallbacks[Math.floor(Math.random() * fallbacks.length)];
        mottoFrom = '';
        startTyping();
    }

    function startTyping() {
        charIndex = 0;
        isDeleting = false;
        mottoEl.textContent = '';
        typeStep();
    }

    function typeStep() {
        var display = mottoText + mottoFrom;
        var len = display.length;

        if (!isDeleting) {
            charIndex++;
            mottoEl.textContent = display.substring(0, charIndex);
            if (charIndex >= len) {
                isDeleting = true;
                setTimeout(typeStep, pauseTime);
                return;
            }
            setTimeout(typeStep, typeSpeed);
        } else {
            charIndex--;
            mottoEl.textContent = display.substring(0, charIndex);
            if (charIndex <= 0) {
                mottoText = '';
                mottoFrom = '';
                setTimeout(fetchHitokoto, 400);
                return;
            }
            setTimeout(typeStep, deleteSpeed);
        }
    }

    setTimeout(fetchHitokoto, 2000);

    var uptimeEl = document.getElementById('uptime');
    var launchTime = new Date('2026-06-01T16:33:00Z');

    function updateUptime() {
        var diff = Date.now() - launchTime.getTime();
        if (diff < 0) {
            uptimeEl.textContent = '⏳ 即将开站...';
            return;
        }
        var s = Math.floor(diff / 1000);
        var d = Math.floor(s / 86400);
        var h = Math.floor((s % 86400) / 3600);
        var m = Math.floor((s % 3600) / 60);
        var sec = s % 60;
        uptimeEl.textContent = '❄️ 已运行 ' + d + ' 天 ' + h + ' 小时 ' + m + ' 分 ' + sec + ' 秒';
    }
    updateUptime();
    setInterval(updateUptime, 1000);

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js').then(function(reg) {
                console.log('SW registered:', reg.scope);
            }).catch(function(err) {
                console.log('SW registration failed:', err);
            });
        });
    }
})();
</script>

</body>
</html>
