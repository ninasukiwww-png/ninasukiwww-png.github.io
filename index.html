<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowBlock · 个人导航</title>
    <meta name="description" content="SnowBlock 个人导航页 — 博客、MC服务器、状态监控、主机监控一站式">
    <meta name="theme-color" content="#0b2b3b">
    <meta name="color-scheme" content="light">

    <!-- Open Graph -->
    <meta property="og:title" content="SnowBlock · 个人导航">
    <meta property="og:description" content="博客、MC服务器、状态监控、主机监控">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="zh_CN">

    <!-- Favicon (emoji SVG) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>">

    <!-- 预连接：Google Analytics -->
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9f5ff 0%, #ffffff 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .card {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border-radius: 3rem;
            box-shadow:
                0 25px 45px -12px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(156, 200, 255, 0.3);
            overflow: hidden;
        }

        .header {
            background: #0b2b3b;
            padding: 2rem 2rem 1.5rem;
            text-align: center;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffe6b0, #c0f0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .header .domain {
            color: #7fbcce;
            margin-top: 0.5rem;
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            font-size: 1rem;
            letter-spacing: 0.02em;
        }

        .content {
            padding: 2rem;
        }

        .greeting {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0f3b4a;
            border-left: 4px solid #2aa5c1;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }

        .service-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .service-item {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.4rem 0.5rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            transition:
                background 0.2s ease,
                transform 0.2s ease,
                box-shadow 0.2s ease;
            border: 1px solid rgba(42, 165, 193, 0.2);
            text-decoration: none;
            color: inherit;
            outline-offset: 2px;
        }

        .service-item:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateX(4px);
            box-shadow: 0 4px 16px -6px rgba(42, 165, 193, 0.25);
        }

        .service-item:focus-visible {
            outline: 2px solid #2aa5c1;
            outline-offset: 2px;
        }

        .service-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f3b4a;
            flex-shrink: 0;
            min-width: 120px;
        }

        .service-url {
            color: #2aa5c1;
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            word-break: break-all;
        }

        .service-desc {
            font-size: 0.75rem;
            color: #6c9aad;
            white-space: nowrap;
        }

        .music-player {
            margin: 1.5rem 0 0.5rem;
            border-radius: 1.5rem;
            overflow: hidden;
        }

        .footer-note {
            font-size: 0.8rem;
            color: #6c9aad;
            text-align: center;
            margin-top: 1.5rem;
            border-top: 1px solid #d0e2ec;
            padding-top: 1rem;
        }

        /* 移动端适配 */
        @media (max-width: 550px) {
            body {
                padding: 0.8rem;
            }
            .card {
                border-radius: 2rem;
            }
            .header {
                padding: 1.5rem 1.2rem 1.2rem;
            }
            .header h1 {
                font-size: 2.2rem;
            }
            .content {
                padding: 1.2rem;
            }
            .greeting {
                font-size: 1.2rem;
            }
            .service-item {
                padding: 0.9rem 1rem;
                border-radius: 1.2rem;
            }
            .service-name {
                min-width: auto;
                width: 100%;
                margin-bottom: 0.1rem;
            }
            .service-desc {
                white-space: normal;
            }
        }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-94E19J45J8"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-94E19J45J8');
    </script>
</head>
<body>
    <main class="card">
        <header class="header">
            <h1>❄️ SnowBlock</h1>
            <p class="domain">snowblock.top · 导航</p>
        </header>

        <div class="content">
            <h2 class="greeting">
                导航 & 服务
            </h2>

            <nav class="service-list" aria-label="服务导航">
                <a href="https://blog.snowblock.top" class="service-item" target="_blank" rel="noopener noreferrer">
                    <span class="service-name">博客</span>
                    <span class="service-url">blog.snowblock.top</span>
                </a>
                <a href="https://play.snowblock.top" class="service-item" target="_blank" rel="noopener noreferrer">
                    <span class="service-name">MC 服务器</span>
                    <span class="service-url">play.snowblock.top</span>
                </a>
                <a href="https://status.snowblock.top" class="service-item" target="_blank" rel="noopener noreferrer">
                    <span class="service-name">MC 状态监控</span>
                    <span class="service-url">status.snowblock.top</span>
                </a>
                <a href="https://monitor.snowblock.top" class="service-item" target="_blank" rel="noopener noreferrer">
                    <span class="service-name">服务器性能监控</span>
                    <span class="service-url">monitor.snowblock.top</span>
                </a>
            </nav>

            <!-- 音乐控件 -->
            <div class="music-player">
                <iframe
                    style="border-radius:12px"
                    src="https://open.spotify.com/embed/album/4b9nOSXSf1LROzgfYFxdxI?utm_source=generator"
                    width="100%"
                    height="152"
                    frameborder="0"
                    allowfullscreen
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy"
                    title="Spotify 音乐播放器">
                </iframe>
            </div>

            <footer class="footer-note" role="contentinfo">
                子域名现在大都只是空壳，所以进不去是正常的（
            </footer>
        </div>
    </main>
</body>
</html>
