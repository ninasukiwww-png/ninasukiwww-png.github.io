<!-- 加载层 -->
<div id="loader">
    <div class="loader-icon">❄️</div>

<main class="card loading" id="mainCard">
    <header class="header">
        <h1>❄️ SnowBlock</h1>
        <p class="domain">snowblock.top · 导航</p>
    </header>

    <div class="content">
        <h2 class="greeting" id="greeting"></h2>

        <nav class="service-list" aria-label="服务导航">
            <a href="https://blog.snowblock.top" class="service-item" target="_blank" rel="noopener">
                <span class="service-name">博客</span>
                <span class="service-url">blog.snowblock.top</span>
            </a>

                  aria-label="复制 MC 服务器地址 play.snowblock.top">
                <span class="service-name">MC 服务器</span>
                <span class="service-url">play.snowblock.top</span>

<script>
(function() {
    'use strict';

    /* ========== 加载逻辑 ========== */
    const loader = document.getElementById('loader');
    const card = document.getElementById('mainCard');
    const bgImage = 'https://snowblock.top/138936740_p0.webp';
    let loaded = false;
    let minTimePassed = false;

    const img = new Image();
    img.src = bgImage;
    img.onload = () => { loaded = true; checkShowCard(); };
    img.onerror = () => { loaded = true; checkShowCard(); };

    // 至少显示 1.5 秒
    setTimeout(() => {
        minTimePassed = true;
        checkShowCard();
    }, 1500);

    // 超时 5 秒强制显示
    const timeout = setTimeout(() => {
        if (!card.classList.contains('visible')) {
            loaded = true;
            minTimePassed = true;
            checkShowCard();
        }
    }, 5000);

    function checkShowCard() {
        if (loaded && minTimePassed && !card.classList.contains('visible')) {
            clearTimeout(timeout);
            loader.classList.add('hidden');
            card.classList.remove('loading');
            setTimeout(() => card.classList.add('visible'), 20);
            loader.addEventListener('transitionend', () => {
                if (loader.classList.contains('hidden')) {
                    loader.style.display = 'none';
                }
            }, { once: true });
        }
    }

    /* ========== 雪花 ========== */
    const canvas = document.getElementById('snowCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let w, h;

    function resizeCanvas() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const MAX_PARTICLES = window.innerWidth < 768 ? 30 : 60;

    function createParticle() {
        return {
            x: Math.random() * w,
            y: -10,
            r: Math.random() * 2.5 + 1.2,
            speed: Math.random() * 0.6 + 0.15,
            wind: Math.random() * 0.3 - 0.15,
            alpha: Math.random() * 0.35 + 0.15
        };
    }

    function initSnow() {
        for (let i = 0; i < MAX_PARTICLES; i++) {
            let p = createParticle();
            p.y = Math.random() * h;
            particles.push(p);
        }
    }
    initSnow();

    function drawSnow() {
        ctx.clearRect(0, 0, w, h);
        for (let i = 0; i < particles.length; i++) {
            let p = particles[i];
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, ' + p.alpha + ')';
            ctx.fill();
            p.y += p.speed;
            p.x += p.wind;
            if (p.y > h + 10) particles[i] = createParticle();
            if (p.x > w + 10) p.x = -10;
            if (p.x < -10) p.x = w + 10;
        }
        while (particles.length < MAX_PARTICLES) {
            particles.push(createParticle());
        }
        requestAnimationFrame(drawSnow);
    }
    drawSnow();

    /* ========== Toast & 复制 ========== */
    const toast = document.getElementById('toast');
    let toastTimer = null;

    function showToast(msg, dur = 2000) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), dur);
    }

    function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ 已复制：' + text);
            }).catch(() => {
                fallbackCopy(text);
            });
        } else {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        try {
            if (document.execCommand('copy')) showToast('✅ 已复制：' + text);
            else showToast('❌ 复制失败');
        } catch(e) {
            showToast('❌ 复制失败');
        }
        document.body.removeChild(ta);
    }

    document.querySelectorAll('[data-copy]').forEach(el => {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            const t = el.getAttribute('data-copy');
            if (t) {
                copyText(t);
                el.classList.add('copied');
                setTimeout(() => el.classList.remove('copied'), 300);
            }
        });
        el.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                el.click();
            }
        });
    });

    /* ========== 问候语 ========== */
    const greetingEl = document.getElementById('greeting');
    if (greetingEl) {
        const hour = new Date().getHours();
        let greet;
        if (hour < 6) greet = '🌙 夜深了';
        else if (hour < 9) greet = '🌅 早上好';
        else if (hour < 12) greet = '☀️ 上午好';
        else if (hour < 14) greet = '🌤️ 中午好';
        else if (hour < 18) greet = '🌇 下午好';
        else if (hour < 21) greet = '🌆 傍晚好';
        else greet = '🌙 晚上好';
        greetingEl.textContent = greet + '，要做些什么？';
    }

    /* ========== 时钟 ========== */
    const clockTime = document.getElementById('clockTime');
    const clockSeconds = document.getElementById('clockSeconds');

    function updateClock() {
        const now = new Date();
        clockTime.textContent = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        clockSeconds.textContent = String(now.getSeconds()).padStart(2, '0');
    }
    updateClock();
    setInterval(updateClock, 1000);

    /* ========== 一言打字机 ========== */
    const mottoEl = document.getElementById('statusMotto');
    let mottoText = '';
    let mottoFrom = '';
    let charIndex = 0;
    let isDeleting = false;
    const typeSpeed = 60;
    const deleteSpeed = 25;
    const pauseTime = 6000;
    let isBusy = false;

    const fallbacks = [
        '❄️ 今天也在雪地里码代码',
        '🎮 服务器开着，来玩吗',
        '☕ 咖啡因浓度：高',
        '🌙 夜猫子出没中',
        '🏔️ 雪山服务器运行中',
        '✨ 保持好奇，保持愚蠢',
        '⚡ 系统状态：摸鱼',
        '🍵 先喝口水再干活',
        '🌨️ 雪下了一整天',
        '🔄 正在重启智商...',
        '🎯 目标是：不咕'
    ];

    function fetchHitokoto() {
        if (isBusy) return;
        isBusy = true;

        const xhr = new XMLHttpRequest();
        xhr.open('GET', 'https://v1.hitokoto.cn', true);
        xhr.timeout = 4000;

        xhr.onload = () => {
            isBusy = false;
            if (xhr.status === 200) {
                try {
                    const data = JSON.parse(xhr.responseText);
                    if (data && data.hitokoto) {
                        mottoText = data.hitokoto;
                        mottoFrom = data.from ? ' ——' + data.from : '';
                        startTyping();
                        return;
                    }
                } catch(e) {}
            }
            useFallback();
        };

        xhr.onerror = () => { isBusy = false; useFallback(); };
        xhr.ontimeout = () => { isBusy = false; useFallback(); };
        xhr.send();
    }

    function useFallback() {
        mottoText = fallbacks[Math.floor(Math.random() * fallbacks.length)];
        mottoFrom = '';
        startTyping();
    }

    function startTyping() {
        charIndex = 0;
        isDeleting = false;
        mottoEl.textContent = '';
        typeStep();
    }

    function typeStep() {
        const display = mottoText + mottoFrom;
        const len = display.length;

        if (!isDeleting) {
            charIndex++;
            mottoEl.textContent = display.substring(0, charIndex);
            if (charIndex >= len) {
                isDeleting = true;
                setTimeout(typeStep, pauseTime);
                return;
            }
            setTimeout(typeStep, typeSpeed);
        } else {
            charIndex--;
            mottoEl.textContent = display.substring(0, charIndex);
            if (charIndex <= 0) {
                mottoText = '';
                mottoFrom = '';
                setTimeout(fetchHitokoto, 400);
                return;
            }
            setTimeout(typeStep, deleteSpeed);
        }
    }

    setTimeout(fetchHitokoto, 2000);

    /* ========== 运行时间 ========== */
    const uptimeEl = document.getElementById('uptime');
    const launchTime = new Date('2026-06-01T16:33:00Z');

    function updateUptime() {
        const diff = Date.now() - launchTime.getTime();
        if (diff < 0) {
            uptimeEl.textContent = '⏳ 即将开站...';
            return;
        }
        const s = Math.floor(diff / 1000);
        const d = Math.floor(s / 86400);
        const h = Math.floor((s % 86400) / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        uptimeEl.textContent = '❄️ 已运行 ' + d + ' 天 ' + h + ' 小时 ' + m + ' 分 ' + sec + ' 秒';
    }
    updateUptime();
    setInterval(updateUptime, 1000);

    /* ========== Service Worker 注册 ========== */
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('SW registered:', reg.scope);
            }).catch(err => {
                console.log('SW registration failed:', err);
            });
        });
    }
})();
</script>

</body>
</html>
