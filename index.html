<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowBlock · 个人导航</title>
    <meta name="description" content="SnowBlock 个人导航页 — 博客、MC服务器、状态监控、主机监控一站式">
    <meta name="theme-color" content="#0b2b3b">
    <meta name="color-scheme" content="light">

    <!-- Open Graph -->
    <meta property="og:title" content="SnowBlock · 个人导航">
    <meta property="og:description" content="博客、MC服务器、状态监控、主机监控">

    <!-- Favicon (emoji SVG) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>">

    <!-- 预连接：Google Analytics -->
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== 背景图片 & 毛玻璃容器 ========== */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;

            /* ▼ 背景图：放置根目录下 0.png */
            background: #0b2b3b url('138936740_p0.png') center / cover no-repeat fixed;
        }

        /* 当背景图加载失败时的回退 */
        body:has(> :not(img)) {
            background-color: #0f3b4a;
        }

        /* ========== 毛玻璃卡片 ========== */
        .card {
            max-width: 800px;
            width: 100%;

            /* ▸ 玻璃拟态核心 */
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(16px) saturate(1.4);
            -webkit-backdrop-filter: blur(16px) saturate(1.4);
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow:
                0 30px 60px -16px rgba(0, 0, 0, 0.40),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);

            overflow: hidden;
            transition: backdrop-filter 0.3s ease, box-shadow 0.3s ease;
        }

        /* 深色头部 — 半透明以透出背景 */
        .header {
            background: rgba(11, 43, 59, 0.72);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffe6b0, #c0f0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .header .domain {
            color: rgba(127, 188, 206, 0.92);
            margin-top: 0.5rem;
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            font-size: 1rem;
            letter-spacing: 0.02em;
        }

        /* ========== 内容区 ========== */
        .content {
            padding: 2rem;
        }

        .greeting {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.30);
            border-left: 4px solid #7fd1e8;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }

        /* ========== 服务列表 — 半透明毛玻璃项 ========== */
        .service-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .service-item {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.4rem 0.5rem;

            /* ▸ 毛玻璃项 */
            background: rgba(255, 255, 255, 0.20);
            backdrop-filter: blur(10px) saturate(1.3);
            -webkit-backdrop-filter: blur(10px) saturate(1.3);
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 16px -6px rgba(0, 0, 0, 0.12);

            text-decoration: none;
            color: inherit;
            outline-offset: 2px;

            transition:
                background 0.25s ease,
                transform 0.25s ease,
                box-shadow 0.25s ease,
                backdrop-filter 0.25s ease;

            cursor: default; /* 默认, 可点击的单独加 cursor */
        }

        /* 可点击的服务项 */
        .service-item[href] {
            cursor: pointer;
        }
        /* 可复制的服务项 */
        .service-item[data-copy] {
            cursor: copy;
        }

        .service-item:hover {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(14px) saturate(1.5);
            -webkit-backdrop-filter: blur(14px) saturate(1.5);
            transform: translateX(4px) scale(1.01);
            box-shadow: 0 8px 28px -10px rgba(0, 0, 0, 0.25);
        }

        .service-item:focus-visible {
            outline: 2px solid #7fd1e8;
            outline-offset: 3px;
        }

        /* 复制成功闪烁 */
        .service-item.copied {
            background: rgba(100, 220, 180, 0.35) !important;
            border-color: rgba(100, 220, 180, 0.6) !important;
            transform: scale(1.02);
            transition: all 0.12s ease;
        }

        .service-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.25);
            flex-shrink: 0;
            min-width: 120px;
        }

        .service-url {
            color: #d4f0ff;
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            word-break: break-all;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
        }

        .service-desc {
            font-size: 0.75rem;
            color: rgba(200, 230, 245, 0.85);
            white-space: nowrap;
        }

        /* ========== Toast 提示 ========== */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            padding: 0.7rem 1.6rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.30);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.30s ease, transform 0.30s ease;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ========== 音乐播放器 ========== */
        .music-player {
            margin: 1.5rem 0 0.5rem;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 4px 20px -8px rgba(0, 0, 0, 0.20);
        }

        /* ========== 页脚 ========== */
        .footer-note {
            font-size: 0.8rem;
            color: rgba(200, 230, 245, 0.75);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.20);
            text-align: center;
            margin-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            padding-top: 1rem;
        }

        /* ==============================================
                   跨屏幕尺寸优化
                   ============================================== */

        /* 小平板 / 大手机 */
        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }
            .card {
                border-radius: 2.2rem;
            }
            .header {
                padding: 1.5rem 1.2rem 1.2rem;
            }
            .header h1 {
                font-size: 2.4rem;
            }
            .content {
                padding: 1.5rem;
            }
            .greeting {
                font-size: 1.3rem;
                padding-left: 0.8rem;
            }
            .service-item {
                padding: 0.9rem 1rem;
                border-radius: 1.2rem;
            }
            .service-name {
                min-width: auto;
                width: 100%;
                margin-bottom: 0.1rem;
                font-size: 1.1rem;
            }
            .service-desc {
                white-space: normal;
            }
            .service-url {
                font-size: 0.9rem;
            }
        }

        /* 小手机 (< 400px) */
        @media (max-width: 400px) {
            body {
                padding: 0.5rem;
            }
            .card {
                border-radius: 1.8rem;
            }
            .header {
                padding: 1.2rem 0.8rem 1rem;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .header .domain {
                font-size: 0.8rem;
            }
            .content {
                padding: 1rem;
            }
            .greeting {
                font-size: 1.1rem;
                border-left-width: 3px;
                padding-left: 0.6rem;
                margin-bottom: 1rem;
            }
            .service-list {
                gap: 0.7rem;
                margin: 1rem 0;
            }
            .service-item {
                padding: 0.75rem 0.85rem;
                border-radius: 1rem;
                gap: 0.3rem;
            }
            .service-name {
                font-size: 1rem;
            }
            .service-url {
                font-size: 0.8rem;
            }
            .music-player iframe {
                height: 120px;
            }
            .footer-note {
                font-size: 0.7rem;
                margin-top: 1rem;
                padding-top: 0.7rem;
            }
            .toast {
                font-size: 0.8rem;
                padding: 0.5rem 1.2rem;
                bottom: 1.2rem;
                max-width: 85vw;
                text-align: center;
            }
        }

        /* 大屏 (≥ 1200px) 舒适间距 */
        @media (min-width: 1200px) {
            body {
                padding: 3rem;
            }
            .card {
                max-width: 860px;
                border-radius: 3.5rem;
            }
            .header {
                padding: 2.5rem 2.5rem 1.8rem;
            }
            .header h1 {
                font-size: 3.6rem;
            }
            .content {
                padding: 2.5rem;
            }
            .service-item {
                padding: 1.2rem 1.6rem;
            }
            .service-name {
                font-size: 1.35rem;
                min-width: 140px;
            }
        }

        /* 减少动画（无障碍） */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }
    </style>

<body>

    <!-- Toast 提示容器 -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <main class="card">
        <header class="header">
            <h1>❄️ SnowBlock</h1>
            <p class="domain">snowblock.top · 导航</p>
        </header>

        <div class="content">
            <h2 class="greeting">
                导航 & 服务
            </h2>

            <nav class="service-list" aria-label="服务导航">

                <!-- ① 博客 — 正常跳转 -->
                <a href="https://blog.snowblock.top"
                   class="service-item"
                   target="_blank" rel="noopener noreferrer">
                    <span class="service-name">博客</span>
                    <span class="service-url">blog.snowblock.top</span>
                </a>

                <!-- ② MC 服务器 — 点击复制（play 开头） -->
                <span class="service-item"
                      data-copy="play.snowblock.top"
                      tabindex="0"
                      role="button"
                      aria-label="复制 MC 服务器地址 play.snowblock.top">
                    <span class="service-name">MC 服务器</span>
                    <span class="service-url">play.snowblock.top</span>
                    <span class="service-desc">点击复制</span>
                </span>

                <!-- ③ MC 状态监控 — 正常跳转 -->
                <a href="https://status.snowblock.top"
                   class="service-item"
                   target="_blank" rel="noopener noreferrer">
                    <span class="service-name">MC 状态监控</span>
                    <span class="service-url">status.snowblock.top</span>
                </a>

                <!-- ④ 服务器性能监控 — 正常跳转 -->
                <a href="https://monitor.snowblock.top"
                   class="service-item"
                   target="_blank" rel="noopener noreferrer">
                    <span class="service-name">服务器性能监控</span>
                    <span class="service-url">monitor.snowblock.top</span>
                </a>

            </nav>

            <!-- 音乐控件 -->
            <div class="music-player">
                <iframe
                    style="border-radius:12px"
                    src="https://open.spotify.com/embed/album/4b9nOSXSf1LROzgfYFxdxI?utm_source=generator"
                    width="100%"
                    height="152"
                    frameborder="0"
                    allowfullscreen
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy"
                    title="Spotify 音乐播放器">
                </iframe>
            </div>

            <footer class="footer-note" role="contentinfo">
                子域名现在大都只是空壳，所以进不去是正常的（
            </footer>
        </div>
    </main>

    <script>
        (function() {
            'use strict';

            const toast = document.getElementById('toast');
            let toastTimer = null;

            /** 显示 Toast 提示 */
            function showToast(msg, duration) {
                duration = duration || 2000;
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(function() {
                    toast.classList.remove('show');
                }, duration);
            }

            /** 复制文本到剪贴板 */
            function copyText(text) {
                // 优先使用 Clipboard API
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(function() {
                        showToast('✅ 已复制: ' + text);
                    }).catch(function() {
                        fallbackCopy(text);
                    });
                } else {
                    fallbackCopy(text);
                }
            }

            /** 兼容旧浏览器的复制方式 */
            function fallbackCopy(text) {
                var ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                ta.style.top = '-9999px';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                try {
                    var ok = document.execCommand('copy');
                    if (ok) {
                        showToast('✅ 已复制: ' + text);
                    } else {
                        showToast('❌ 复制失败，请手动复制');
                    }
                } catch (e) {
                    showToast('❌ 复制失败，请手动复制');
                }
                document.body.removeChild(ta);
            }

            // ---- 绑定所有 data-copy 元素 ----
            var copyEls = document.querySelectorAll('[data-copy]');
            Array.prototype.forEach.call(copyEls, function(el) {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var text = el.getAttribute('data-copy');
                    if (text) {
                        copyText(text);
                        // 闪烁反馈
                        el.classList.add('copied');
                        setTimeout(function() {
                            el.classList.remove('copied');
                        }, 300);
                    }
                });

                // 键盘支持 (回车/空格)
                el.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        el.click();
                    }
                });
            });

        })();
    </script>
</body>
