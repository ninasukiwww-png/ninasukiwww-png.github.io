<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="SnowBlock 个人导航页 — 博客、MC 服务器、状态监控、主机监控一站式">
    <meta name="theme-color" content="#0b2b3b">
    <meta name="color-scheme" content="light">
    <meta property="og:title" content="SnowBlock · 个人导航">
    <meta property="og:description" content="❄️ SnowBlock 个人导航 — 博客、MC 服务器、状态监控、主机监控一站式">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="zh_CN">

    <meta name="twitter:image" content="https://snowblock.top/138936740_p0.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>">
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg-deep: #0b2b3b;
            --color-accent: #8fd8ef;
            --glass-bg: rgba(255,255,255,0.12);
            --glass-border: rgba(255,255,255,0.20);
            --glass-hover-bg: rgba(255,255,255,0.22);
            --glass-header-bg: rgba(11,43,59,0.55);
            --shadow-card: 0 30px 60px -16px rgba(0,0,0,0.45);
            --shadow-item: 0 4px 16px -6px rgba(0,0,0,0.15);
            --shadow-toast: 0 8px 30px rgba(0,0,0,0.35);
            --radius-card: 3rem;
            --radius-item: 1.5rem;
            --font-mono: 'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;
            --font-sans: 'Segoe UI',Roboto,'Helvetica Neue',system-ui,-apple-system,sans-serif;
            --font-title: 'ZCOOL KuaiLe', cursive, var(--font-sans);
            /* 比例化 body-pad：gap/卡片宽度 ≈ 6.67%（1:15），与桌面一致 */
            --body-pad: clamp(1.2rem, 5.88vw, 2.5rem);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--body-pad);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            background: var(--color-bg-deep) url('138936740_p0.png') center / cover no-repeat fixed;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.30);
            pointer-events: none;
            z-index: 0;
        }

        body > * { position: relative; z-index: 1; }

        /* ===== 飘雪画布 ===== */
        #snowCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 卡片入场动画 ===== */
        .card {
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px) saturate(1.2);
            -webkit-backdrop-filter: blur(12px) saturate(1.2);
            border-radius: var(--radius-card);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.12);
            overflow: hidden;
            opacity: 0;
            transform: translateY(24px);
            animation: cardEnter 0.8s ease forwards;
        }

        @keyframes cardEnter {
            0%   { opacity: 0; transform: translateY(24px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== 头部 ===== */
        .header {
            background: var(--glass-header-bg);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .header h1 {
            font-size: clamp(1.8rem,5vw,3rem);
            font-weight: 400;
            font-family: var(--font-title);
            background: linear-gradient(135deg,#ffe6b0,#c0f0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.3;
        }

        .header .domain {
            color: rgba(180,220,235,0.92);
            margin-top: 0.2rem;
            font-family: var(--font-mono);
            font-size: clamp(0.7rem,1.5vw,0.9rem);
            letter-spacing: 0.02em;
        }

        .content { padding: 1.5rem 1.8rem; }

        /* ===== 问候语入场 ===== */
        .greeting {
            font-size: clamp(0.9rem,2.5vw,1.3rem);
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.45);
            border-left: 4px solid var(--color-accent);
            padding-left: 0.9rem;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeSlide 0.5s ease 0.3s forwards;
        }

        /* ===== 服务列表 & 逐项入场 ===== */
        .service-list {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin: 1rem 0;
        }

        .service-item {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.2rem 0.4rem;
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(8px) saturate(1.2);
            -webkit-backdrop-filter: blur(8px) saturate(1.2);
            border-radius: var(--radius-item);
            padding: 0.75rem 1.1rem;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: var(--shadow-item);
            text-decoration: none;
            color: inherit;
            outline-offset: 2px;
            transition: background 0.25s, transform 0.25s, box-shadow 0.25s;
            cursor: default;
            opacity: 0;
            transform: translateX(-12px);
        }

        .service-item:nth-child(1) { animation: fadeSlide 0.4s ease 0.4s forwards; }
        .service-item:nth-child(2) { animation: fadeSlide 0.4s ease 0.5s forwards; }
        .service-item:nth-child(3) { animation: fadeSlide 0.4s ease 0.6s forwards; }
        .service-item:nth-child(4) { animation: fadeSlide 0.4s ease 0.7s forwards; }

        @keyframes fadeSlide {
            0%   { opacity: 0; transform: translateX(-12px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .service-item[href] { cursor: pointer; }
        .service-item[data-copy] { cursor: copy; }

        @media (hover: hover) {
            .service-item:hover {
                background: var(--glass-hover-bg);
                backdrop-filter: blur(12px) saturate(1.4);
                transform: translateX(4px) scale(1.01);
                box-shadow: 0 8px 28px -10px rgba(0,0,0,0.30);
            }
        }

        .service-item:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 3px;
        }

        .service-item.copied {
            background: rgba(100,220,180,0.25) !important;
            border-color: rgba(100,220,180,0.45) !important;
            transform: scale(1.02);
            transition: all 0.12s;
        }

        .service-name {
            font-size: clamp(0.85rem,2.2vw,1.05rem);
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.35);
            flex-shrink: 0;
            min-width: 85px;
        }

        .service-url {
            color: #ddf4ff;
            font-family: var(--font-mono);
            word-break: break-all;
            text-shadow: 0 1px 4px rgba(0,0,0,0.25);
            font-size: clamp(0.65rem,1.8vw,0.9rem);
        }

        .service-desc {
            font-size: 0.6rem;
            color: rgba(200,235,250,0.80);
            white-space: nowrap;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            padding: 0.7rem 1.6rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: var(--shadow-toast);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== 状态框入场 ===== */
        .status-box {
            margin: 1rem 0 0.3rem;
            padding: 1rem 1.2rem;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(8px) saturate(1.2);
            -webkit-backdrop-filter: blur(8px) saturate(1.2);
            border-radius: var(--radius-item);
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 4px 20px -8px rgba(0,0,0,0.25);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            opacity: 0;
            animation: fadeSlide 0.5s ease 0.8s forwards;
        }

        .clock {
            font-family: var(--font-mono);
            font-size: clamp(1.8rem,5vw,2.6rem);
            font-weight: 300;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.40);
            letter-spacing: 0.06em;
            line-height: 1.2;
        }

        .clock .seconds {
            font-size: 0.55em;
            color: rgba(255,255,255,0.55);
            vertical-align: super;
        }

        .status-motto {
            font-size: clamp(0.75rem,2vw,0.9rem);
            color: rgba(200,235,250,0.80);
            text-shadow: 0 1px 4px rgba(0,0,0,0.25);
            min-height: 1.5em;
        }

        .status-motto::after {
            content: '▍';
            display: inline;
            animation: blink 0.8s step-end infinite;
            color: rgba(200,235,250,0.60);
            margin-left: 1px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .uptime {
            font-size: clamp(0.6rem,1.5vw,0.75rem);
            color: rgba(200,235,250,0.50);
            text-shadow: 0 1px 4px rgba(0,0,0,0.20);
            font-family: var(--font-mono);
        }

        .footer-note {
            font-size: 0.7rem;
            color: rgba(200,235,250,0.70);
            text-shadow: 0 1px 4px rgba(0,0,0,0.30);
            text-align: center;
            margin-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 0.8rem;
            opacity: 0;
            animation: fadeSlide 0.5s ease 1s forwards;
        }

        /* ==========================================
               响应式 — 手机端与电脑端比例一致
               body-pad 由 clamp 自动缩放，不用再改
               只调整内边距和圆角等视觉细节
               ========================================== */
        @media (max-width: 760px) {
            .card { border-radius: 2.2rem; }
            .header { padding: 1.4rem 1.4rem 1.1rem; }
            .content { padding: 1.2rem 1.4rem; }
            .service-item { padding: 0.65rem 0.9rem; border-radius: 1.2rem; }
            .service-name { min-width: 75px; }
            .status-box { padding: 0.8rem 1rem; }
        }

        @media (max-width: 520px) {
            .card { border-radius: 1.8rem; }
            .header { padding: 1.1rem 1.1rem 0.9rem; }
            .header h1 { font-size: 1.3rem; }
            .header .domain { font-size: 0.65rem; }
            .content { padding: 1rem 1.1rem; }
            .greeting { font-size: 0.85rem; margin-bottom: 0.8rem; padding-left: 0.7rem; border-left-width: 3px; }
            .service-list { gap: 0.5rem; margin: 0.8rem 0; }
            .service-item { padding: 0.55rem 0.75rem; border-radius: 0.9rem; gap: 0.15rem 0.3rem; }
            .service-name { min-width: 65px; font-size: 0.8rem; }
            .service-url { font-size: 0.6rem; }
            .service-desc { font-size: 0.5rem; }
            .status-box { padding: 0.6rem 0.8rem; gap: 0.3rem; }
            .footer-note { font-size: 0.55rem; margin-top: 0.8rem; padding-top: 0.6rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
            #snowCanvas { display: none; }
        }

        @media print {
            body::before { display: none; }
            body { padding: 1rem; }
            .card { background: #fff; backdrop-filter: none; border: 1px solid #ccc; box-shadow: none; max-width: 100%; opacity: 1; transform: none; animation: none; }
            .header { background: #f5f5f5; }
            .header h1 { background: none; color: #0b2b3b; }
            .greeting { color: #0b2b3b; text-shadow: none; opacity: 1; animation: none; }
            .service-item { background: #fafafa; box-shadow: none; border-color: #ddd; opacity: 1; transform: none; animation: none; }
            .service-name, .service-url { color: #222; text-shadow: none; }
            .status-box { background: #f5f5f5; border-color: #ddd; opacity: 1; animation: none; }
            .clock { color: #222; text-shadow: none; }
            .status-motto { color: #555; }
            .status-motto::after { display: none; }
            .uptime { color: #888; }
            .footer-note { opacity: 1; animation: none; }
            #snowCanvas { display: none; }
        }
    </style>

<body>

<canvas id="snowCanvas"></canvas>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<main class="card">
    <header class="header">
        <h1>❄️ SnowBlock</h1>
        <p class="domain">snowblock.top · 导航</p>
    </header>

    <div class="content">
        <h2 class="greeting" id="greeting"></h2>

        <nav class="service-list" aria-label="服务导航">
            <a href="https://blog.snowblock.top" class="service-item" target="_blank" rel="noopener">
                <span class="service-name">博客</span>
                <span class="service-url">blog.snowblock.top</span>
            </a>

            <span class="service-item" data-copy="play.snowblock.top" tabindex="0" role="button"
                  aria-label="复制 MC 服务器地址 play.snowblock.top">
                <span class="service-name">MC 服务器</span>
                <span class="service-url">play.snowblock.top</span>
                <span class="service-desc">点击复制</span>
            </span>

            <a href="https://status.snowblock.top" class="service-item" target="_blank" rel="noopener">
                <span class="service-name">MC 状态监控</span>
                <span class="service-url">status.snowblock.top</span>
            </a>

            <a href="https://monitor.snowblock.top" class="service-item" target="_blank" rel="noopener">
                <span class="service-name">服务器性能监控</span>
                <span class="service-url">monitor.snowblock.top</span>
            </a>
        </nav>

        <div class="status-box">
            <div class="clock" id="clock">
                <span id="clockTime">00:00</span>
                <span class="seconds" id="clockSeconds">00</span>
            </div>
            <div class="status-motto" id="statusMotto"></div>
            <div class="uptime" id="uptime"></div>
        </div>

        <footer class="footer-note" role="contentinfo">
            子域名现在大都只是空壳，所以进不去是正常的（
        </footer>
    </div>
</main>

<script>
(function() {
    'use strict';

    // ===== 飘雪效果 =====
    var canvas = document.getElementById('snowCanvas');
    var ctx = canvas.getContext('2d');
    var particles = [];
    var w, h;

    function resizeCanvas() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    var MAX_PARTICLES = 60;

    function createParticle() {
        return {
            x: Math.random() * w,
            y: -10,
            r: Math.random() * 2.5 + 1.2,
            speed: Math.random() * 0.6 + 0.15,
            wind: Math.random() * 0.3 - 0.15,
            alpha: Math.random() * 0.35 + 0.15
        };
    }

    function initSnow() {
        for (var i = 0; i < 40; i++) {
            var p = createParticle();
            p.y = Math.random() * h;
            particles.push(p);
        }
    }
    initSnow();

    function drawSnow() {
        ctx.clearRect(0, 0, w, h);

        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, ' + p.alpha + ')';
            ctx.fill();

            p.y += p.speed;
            p.x += p.wind;

            if (p.y > h + 10) {
                particles[i] = createParticle();
            }
            if (p.x > w + 10) p.x = -10;
            if (p.x < -10) p.x = w + 10;
        }

        while (particles.length < MAX_PARTICLES) {
            particles.push(createParticle());
        }

        requestAnimationFrame(drawSnow);
    }
    drawSnow();

    // ===== Toast =====
    var toast = document.getElementById('toast');
    var toastTimer = null;

    function showToast(msg, dur) {
        dur = dur || 2000;
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function() {
            toast.classList.remove('show');
        }, dur);
    }

    function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() {
                showToast('✅ 已复制：' + text);
            }).catch(function() {
                fallbackCopy(text);
            });
        } else {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        try {
            if (document.execCommand('copy')) showToast('✅ 已复制：' + text);
            else showToast('❌ 复制失败');
        } catch(e) {
            showToast('❌ 复制失败');
        }
        document.body.removeChild(ta);
    }

    document.querySelectorAll('[data-copy]').forEach(function(el) {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            var t = el.getAttribute('data-copy');
            if (t) {
                copyText(t);
                el.classList.add('copied');
                setTimeout(function() { el.classList.remove('copied'); }, 300);
            }
        });
        el.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                el.click();
            }
        });
    });

    // ===== 问候语 =====
    var greetingEl = document.getElementById('greeting');
    if (greetingEl) {
        var hour = new Date().getHours();
        var greet;
        if (hour < 6) greet = '🌙 夜深了';
        else if (hour < 9) greet = '🌅 早上好';
        else if (hour < 12) greet = '☀️ 上午好';
        else if (hour < 14) greet = '🌤️ 中午好';
        else if (hour < 18) greet = '🌇 下午好';
        else if (hour < 21) greet = '🌆 傍晚好';
        else greet = '🌙 晚上好';
        greetingEl.textContent = greet + '，要做些什么？';
    }

    // ===== 时钟 =====
    var clockTime = document.getElementById('clockTime');
    var clockSeconds = document.getElementById('clockSeconds');

    function updateClock() {
        var now = new Date();
        var h = String(now.getHours()).padStart(2, '0');
        var m = String(now.getMinutes()).padStart(2, '0');
        var s = String(now.getSeconds()).padStart(2, '0');
        clockTime.textContent = h + ':' + m;
        clockSeconds.textContent = s;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ===== 打字机效果的状态语 =====
    var mottoEl = document.getElementById('statusMotto');
    var mottos = [
        '❄️ 今天也在雪地里码代码',
        '🎮 服务器开着，来玩吗',
        '☕ 咖啡因浓度：高',
        '🌙 夜猫子出没中',
        '🏔️ 雪山服务器运行中',
        '🐧 正在 ping 我的良心...',
        '🛠️ 修 bug 中，请稍候',
        '🎵 脑内循环播放中',
        '📝 写博客的冲动来了',
        '✨ 保持好奇，保持愚蠢',
        '⚡ 系统状态：摸鱼',
        '🍵 先喝口水再干活',
        '🌨️ 雪下了一整天',
        '🧊 冷静，只是服务器而已',
        '🔄 正在重启智商...',
        '🎯 目标是：不咕',
        '📡 信号良好，心情一般',
        '🕒 距离周末还有 ' + ['5 天','4 天','3 天','2 天','1 天','0 天 🎉','0 天 🎉'][new Date().getDay()]
    ];

    var mottoIndex = Math.floor(Math.random() * mottos.length);
    var charIndex = 0;
    var isDeleting = false;
    var typeSpeed = 60;
    var deleteSpeed = 25;
    var pauseTime = 5000;

    function typeMotto() {
        var current = mottos[mottoIndex];

        if (!isDeleting) {
            charIndex++;
            mottoEl.textContent = current.substring(0, charIndex);

            if (charIndex === current.length) {
                isDeleting = true;
                setTimeout(typeMotto, pauseTime);
                return;
            }
            setTimeout(typeMotto, typeSpeed);
        } else {
            charIndex--;
            mottoEl.textContent = current.substring(0, charIndex);

            if (charIndex === 0) {
                isDeleting = false;
                mottoIndex = (mottoIndex + 1) % mottos.length;
                setTimeout(typeMotto, 300);
                return;
            }
            setTimeout(typeMotto, deleteSpeed);
        }
    }

    setTimeout(typeMotto, 1200);

    // ===== 运行时间 =====
    var uptimeEl = document.getElementById('uptime');
    var launchTime = new Date('2026-06-01T16:33:00Z');

    function updateUptime() {
        var diff = Date.now() - launchTime.getTime();
        if (diff < 0) {
            uptimeEl.textContent = '⏳ 即将开站...';
            return;
        }
        var s = Math.floor(diff / 1000);
        var d = Math.floor(s / 86400);
        var h = Math.floor((s % 86400) / 3600);
        var m = Math.floor((s % 3600) / 60);
        var sec = s % 60;
        uptimeEl.textContent = '❄️ 已运行 ' + d + ' 天 ' + h + ' 小时 ' + m + ' 分 ' + sec + ' 秒';
    }
    updateUptime();
    setInterval(updateUptime, 1000);
})();
</script>

</body>
</html>
