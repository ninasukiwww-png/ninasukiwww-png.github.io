    <meta name="twitter:description" content="❄️ SnowBlock 个人导航 — 博客、MC 服务器、状态监控、主机监控一站式">
    <meta name="twitter:image" content="https://vps.snowblock.top/raw/ninasukiwww-png/my-images/main/landing/138936740_p0.webp">

    <link rel="apple-touch-icon" href="https://vps.snowblock.top/raw/ninasukiwww-png/my-images/main/landing/avatar.webp">
    <link rel="preload" href="https://vps.snowblock.top/raw/ninasukiwww-png/my-images/main/landing/138936740_p0.webp" as="image">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--body-pad);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            background:
                url('https://vps.snowblock.top/raw/ninasukiwww-png/my-images/main/landing/138936740_p0.webp') center / cover no-repeat fixed,
                linear-gradient(160deg, #cce7f5, #b3daf2, #9fccee);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.30);
            backdrop-filter: blur(2px);
            pointer-events: none;
            z-index: 0;
        }

        body > * { position: relative; z-index: 1; }

        #snowCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 1.5s ease 0.5s;
        }

        #loader.hidden ~ #snowCanvas {
            opacity: 1;
        }

        /* ===== 加载层 ===== */
        #loader {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #d4eaf7, #b8d8ee, #d4eaf7);
            background-size: 200% 200%;
            animation: loaderBgShift 6s ease infinite;
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease, transform 0.5s ease;
        }

        @keyframes loaderBgShift {
            0%   { background-position: 0% 0%; }
            50%  { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: scale(1.05);
        }

        /* ===== 方案三：SVG 雪晶生长 ===== */
        .loader-crystal {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        .crystal-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .crystal-svg {
            width: 90px;
            height: 90px;
            animation: crystalFloat 4s ease-in-out infinite;
            filter: drop-shadow(0 0 12px rgba(143,216,239,0.3));
        }

        @keyframes crystalFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25%      { transform: translateY(-8px) rotate(3deg); }
            75%      { transform: translateY(4px) rotate(-2deg); }
        }

        .crystal-svg .main-line {
            stroke-dasharray: 360;
            stroke-dashoffset: 360;
            animation: drawCrystal 3.5s ease-in-out infinite alternate;
        }

        .crystal-svg .inner-line {
            stroke-dasharray: 240;
            stroke-dashoffset: 240;
            animation: drawCrystal 3.5s ease-in-out 0.6s infinite alternate;
        }

        .crystal-svg .core-line {
            stroke-dasharray: 80;
            stroke-dashoffset: 80;
            animation: drawCrystal 2.5s ease-in-out 1.2s infinite alternate;
        }

        @keyframes drawCrystal {
            0%   { stroke-dashoffset: 360; }
            60%  { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: 0; }
        }

        .crystal-glow {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(143,216,239,0.15), transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50%      { opacity: 0.8; transform: scale(1.2); }
        }

        .loader-text-frost {
            font-family: var(--font-title);
            font-size: 1.3rem;
            background: linear-gradient(135deg, #8fd8ef, #c0f0ff, #ffe6b0, #8fd8ef);
            background-size: 300% 300%;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: frostShift 4s ease infinite;
        }

        @keyframes frostShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .loader-dots {
            display: flex;
            gap: 6px;
            margin-top: 0.2rem;
        }

        .loader-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #8fd8ef;
            animation: dotBounce 1.2s ease-in-out infinite;
        }

        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50%      { transform: translateY(-8px); opacity: 1; }
        }

        @media (prefers-color-scheme: dark) {
            #loader { background: linear-gradient(135deg, #0d1f2b, #142a38, #0d1f2b); background-size: 200% 200%; }
            body { background: url(https://vps.snowblock.top/raw/ninasukiwww-png/my-images/main/landing/138936740_p0.webp) center/cover fixed, linear-gradient(160deg,#0b1a24,#162b36); }
            body::before { background: rgba(0,0,0,0.40); backdrop-filter: blur(2px); }
        }
    </style>
    <link rel="stylesheet" href="assets/css/style.css">


</head>
<body>

<!-- ===== 加载层 ===== -->
<div id="loader">
    <div class="loader-crystal">
        <div class="crystal-wrapper">
            <div class="crystal-glow"></div>
            <svg class="crystal-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path class="main-line" stroke="#8fd8ef" stroke-width="2.2" stroke-linecap="round"
                      fill="none"
                      d="M50 5 L50 95
                         M50 5 L75 25 L50 50
                         M50 5 L25 25 L50 50
                         M50 95 L75 75 L50 50
                         M50 95 L25 75 L50 50
                         M50 50 L95 50
                         M75 25 L95 50
                         M25 25 L5 50
                         M75 75 L95 50
                         M25 75 L5 50" />
                <path class="inner-line" stroke="#c0f0ff" stroke-width="1.4" stroke-linecap="round"
                      fill="none"
                      d="M50 15 L50 85
                         M50 15 L65 30 L50 50
                         M50 15 L35 30 L50 50
                         M50 85 L65 70 L50 50
                         M50 85 L35 70 L50 50
                         M50 50 L85 50
                         M65 30 L85 50
                         M35 30 L15 50
                         M65 70 L85 50
                         M35 70 L15 50" />
                <path class="core-line" stroke="#ffe6b0" stroke-width="1.8" stroke-linecap="round"
                      fill="none"
                      d="M50 38 L50 62
                         M50 38 L57 44 L50 50
                         M50 38 L43 44 L50 50
                         M50 62 L57 56 L50 50
                         M50 62 L43 56 L50 50
                         M50 50 L62 50
                         M57 44 L62 50
                         M43 44 L38 50
                         M57 56 L62 50
                         M43 56 L38 50" />
            </svg>
        </div>
        <div class="loader-text-frost">❄️ 正在连接雪境</div>
        <div class="loader-dots">
            <span></span><span></span><span></span>
        </div>
    </div>
</div>

<canvas id="snowCanvas" aria-hidden="true"></canvas>

<div class="toast" id="toast" aria-live="polite"></div>

<main class="card loading" id="mainCard">
    <header class="header">
        <h1>❄️ SnowBlock</h1>
        <p class="domain">snowblock.top · 导航</p>
    </header>

    <div class="content">
        <h2 class="greeting" id="greeting"></h2>

        <nav class="service-list" aria-label="服务导航">
            <a href="https://blog.snowblock.top" class="service-item" target="_blank" rel="noopener">
                <span class="service-name">博客</span>
                <span class="service-url">blog.snowblock.top</span>
            </a>

            <span class="service-item" data-copy="play.snowblock.top" tabindex="0" role="button"
                  aria-label="复制 MC 服务器地址 play.snowblock.top">
                <span class="service-name">MC 服务器</span>
                <span class="service-url">play.snowblock.top</span>
                <span class="service-desc">点击复制</span>
            </span>

            <a href="https://status.snowblock.top" class="service-item" target="_blank" rel="noopener">
                <span class="service-name">MC 状态监控</span>
                <span class="service-url">status.snowblock.top</span>
            </a>

            <a href="https://vps.snowblock.top/dashboard" class="service-item" target="_blank" rel="noopener">
                <span class="service-name">服务器性能监控</span>
                <span class="service-url">vps.snowblock.top/dashboard</span>
            </a>
        </nav>

        <div class="status-box">
            <div class="clock" id="clock">
                <span id="clockTime">00:00</span>
                <span class="seconds" id="clockSeconds">00</span>
            </div>
            <div class="status-motto" id="statusMotto"></div>
            <div class="uptime" id="uptime"></div>
        </div>

    </div>
</main>

    <script src="assets/js/app.js" defer></script>

</body>
</html>
