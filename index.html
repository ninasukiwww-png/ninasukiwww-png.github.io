<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowBlock · 个人导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9f5ff 0%, #ffffff 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(156, 200, 255, 0.3);
            overflow: hidden;
        }

        .header {
            background: #0b2b3b;
            padding: 2rem 2rem 1.5rem;
            text-align: center;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFE6B0, #C0F0FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header .domain {
            color: #7fbcce;
            margin-top: 0.5rem;
            font-family: monospace;
            font-size: 1rem;
        }

        .content {
            padding: 2rem;
        }

        .greeting {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0f3b4a;
            border-left: 4px solid #2aa5c1;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }

        .service-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .service-item {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            transition: all 0.2s;
            border: 1px solid rgba(42, 165, 193, 0.2);
        }

        .service-item:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateX(4px);
        }

        .service-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f3b4a;
            display: inline-block;
            width: 120px;
        }

        .service-url {
            color: #2aa5c1;
            text-decoration: none;
            font-family: monospace;
            word-break: break-all;
        }

        .service-url:hover {
            text-decoration: underline;
        }

        .music-player {
            margin: 1.5rem 0 0.5rem;
            border-radius: 1.5rem;
            overflow: hidden;
        }

        .footer-note {
            font-size: 0.8rem;
            color: #6c9aad;
            text-align: center;
            margin-top: 1.5rem;
            border-top: 1px solid #d0e2ec;
            padding-top: 1rem;
        }

        @media (max-width: 550px) {
            .service-name {
                display: block;
                width: auto;
                margin-bottom: 0.3rem;
            }
            .greeting { font-size: 1.2rem; }
        }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-94E19J45J8"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-94E19J45J8');
    </script>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>❄️ SnowBlock</h1>
        <div class="domain">snowblock.top · 我的入口</div>
    </div>
    <div class="content">
        <div class="greeting">
            🧭 导航 & 服务
        </div>

        <div class="service-list">
            <div class="service-item">
                <span class="service-name">📝 博客</span>
                <a href="https://blog.snowblock.top" class="service-url" target="_blank">blog.snowblock.top</a>
            </div>
            <div class="service-item">
                <span class="service-name">🎮 MC 服务器</span>
                <a href="https://play.snowblock.top" class="service-url" target="_blank">play.snowblock.top</a>
                <span style="font-size:0.75rem; color:#6c9aad; margin-left:0.5rem;">（游戏内直接连接）</span>
            </div>
            <div class="service-item">
                <span class="service-name">📊 MC 状态监控</span>
                <a href="https://status.snowblock.top" class="service-url" target="_blank">status.snowblock.top</a>
            </div>
            <div class="service-item">
                <span class="service-name">🖥️ 主机监控</span>
                <a href="https://monitor.snowblock.top" class="service-url" target="_blank">monitor.snowblock.top</a>
                <span style="font-size:0.75rem; color:#6c9aad; margin-left:0.5rem;">（CPU/内存/Docker）</span>
            </div>
        </div>

        <!-- 音乐控件 -->
        <div class="music-player">
            <iframe 
                style="border-radius:12px" 
                src="https://open.spotify.com/embed/album/4b9nOSXSf1LROzgfYFxdxI?utm_source=generator" 
                width="100%" 
                height="152" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>

        <div class="footer-note">
            💡 子域名正在陆续配置中，部分链接暂未生效～
        </div>
    </div>
</div>
</body>
</html>
