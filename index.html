<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowBlock · 个人导航</title>
    <meta name="description" content="SnowBlock 个人导航页 — 博客、MC 服务器、状态监控、主机监控一站式">
    <meta name="theme-color" content="#0b2b3b">
    <meta name="color-scheme" content="light dark">
    <meta property="og:title" content="SnowBlock · 个人导航">
    <meta property="og:description" content="❄️ SnowBlock 个人导航 — 博客、MC 服务器、状态监控、主机监控一站式">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="zh_CN">
    <meta property="og:url" content="https://snowblock.top">
    <meta property="og:image" content="https://vps.snowblock.top:9443/raw/ninasukiwww-png/my-images/main/bg.webp">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="SnowBlock 导航背景">
    <meta property="og:site_name" content="SnowBlock">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SnowBlock · 个人导航">
    <meta name="twitter:description" content="❄️ SnowBlock 个人导航 — 博客、MC 服务器、状态监控、主机监控一站式">
    <meta name="twitter:image" content="https://vps.snowblock.top:9443/raw/ninasukiwww-png/my-images/main/bg.webp">
    <link rel="icon" type="image/webp" href="https://vps.snowblock.top:9443/raw/ninasukiwww-png/my-images/main/profile.webp">
    <link rel="apple-touch-icon" href="https://vps.snowblock.top:9443/raw/ninasukiwww-png/my-images/main/profile.webp">
    <link rel="preload" href="https://vps.snowblock.top:9443/raw/ninasukiwww-png/my-images/main/bg.webp" as="image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <style>#loader{display:flex;position:fixed;inset:0;z-index:9999}</style>
    <link rel="stylesheet" href="assets/css/style.css">


</head>
<body>

<!-- ===== 加载层 ===== -->
<div id="loader">
    <div class="loader-crystal">
        <div class="crystal-wrapper">
            <div class="crystal-glow"></div>
            <svg class="crystal-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path class="main-line" stroke="#8fd8ef" stroke-width="2.2" stroke-linecap="round"
                      fill="none"
                      d="M50 5 L50 95
                         M50 5 L75 25 L50 50
                         M50 5 L25 25 L50 50
                         M50 95 L75 75 L50 50
                         M50 95 L25 75 L50 50
                         M50 50 L95 50
                         M75 25 L95 50
                         M25 25 L5 50
                         M75 75 L95 50
                         M25 75 L5 50" />
                <path class="inner-line" stroke="#c0f0ff" stroke-width="1.4" stroke-linecap="round"
                      fill="none"
                      d="M50 15 L50 85
                         M50 15 L65 30 L50 50
                         M50 15 L35 30 L50 50
                         M50 85 L65 70 L50 50
                         M50 85 L35 70 L50 50
                         M50 50 L85 50
                         M65 30 L85 50
                         M35 30 L15 50
                         M65 70 L85 50
                         M35 70 L15 50" />
                <path class="core-line" stroke="#ffe6b0" stroke-width="1.8" stroke-linecap="round"
                      fill="none"
                      d="M50 38 L50 62
                         M50 38 L57 44 L50 50
                         M50 38 L43 44 L50 50
                         M50 62 L57 56 L50 50
                         M50 62 L43 56 L50 50
                         M50 50 L62 50
                         M57 44 L62 50
                         M43 44 L38 50
                         M57 56 L62 50
                         M43 56 L38 50" />
            </svg>
        </div>
        <div class="loader-text-frost">❄️ 正在连接雪境</div>
        <div class="loader-dots">
            <span></span><span></span><span></span>
        </div>
    </div>
</div>

<canvas id="snowCanvas" aria-hidden="true"></canvas>

<div class="toast" id="toast" aria-live="polite"></div>

<main class="card loading" id="mainCard">
    <header class="header">
        <h1>❄️ SnowBlock</h1>
        <p class="domain">snowblock.top · 导航</p>
    </header>

    <div class="content">
        <h2 class="greeting" id="greeting"></h2>

        <nav class="service-list" aria-label="服务导航">
            <a href="https://blog.snowblock.top" class="service-item" >
                <span class="service-name">博客</span>
                <span class="service-url">blog.snowblock.top</span>
            </a>

            <span class="service-item" data-copy="play.snowblock.top" tabindex="0" role="button"
                  aria-label="复制 MC 服务器地址 play.snowblock.top">
                <span class="service-name">MC 服务器</span>
                <span class="service-url">play.snowblock.top</span>
                <span class="service-desc">点击复制</span>
            </span>

            <a href="https://status.snowblock.top" class="service-item" >
                <span class="service-name">MC 状态监控</span>
                <span class="service-url">status.snowblock.top</span>
            </a>

            <a href="https://vps.snowblock.top:9443/" class="service-item" >
                <span class="service-name">服务器性能监控</span>
                <span class="service-url">vps.snowblock.top</span>
            </a>
        </nav>

        <div class="status-box">
            <div class="clock" id="clock">
                <span id="clockTime">00:00</span>
                <span class="seconds" id="clockSeconds">00</span>
            </div>
            <div class="status-motto" id="statusMotto"></div>
            <div class="uptime" id="uptime"></div>
        </div>

    </div>
</main>

    <script src="assets/js/app.js" defer></script>

</body>
</html>
