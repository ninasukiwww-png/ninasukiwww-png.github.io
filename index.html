<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowBlock · 我的小站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9f5ff 0%, #ffffff 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 780px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(156, 200, 255, 0.3);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .header {
            background: #0b2b3b;
            padding: 2rem 2rem 1.5rem;
            text-align: center;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFE6B0, #C0F0FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header .domain {
            color: #7fbcce;
            margin-top: 0.5rem;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .content {
            padding: 2.2rem 2rem;
        }

        .greeting {
            font-size: 1.7rem;
            font-weight: 600;
            color: #0f3b4a;
            border-left: 5px solid #2aa5c1;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }

        .intro {
            color: #1f5063;
            line-height: 1.5;
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }

        @media (max-width: 550px) {
            .header h1 { font-size: 2.2rem; }
            .greeting { font-size: 1.3rem; }
        }
    </style>

    <!-- Google tag (gtag.js) -->
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LWD9M0YBX7"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-LWD9M0YBX7');
</script>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>❄️ SnowBlock</h1>
        <div class="domain">snowblock.top · 刚刚启程</div>
    </div>
    <div class="content">
        <div class="greeting">
            👋 你好，我是你的 GitHub Pages 小站
        </div>
        <div class="intro">
            这个页面跑在 GitHub Pages 上，域名 <strong>snowblock.top</strong> 通过阿里云解析过来。
        </div>
        <!-- 下面可以接着写你想添加的内容 -->
    </div>
</div>
</body>
</html>
